name: import-smoke
# PILOT: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Triggers preserved verbatim from the prior local file.
# New required-status-check context: "import-smoke / import-smoke-on-ubuntu-py3-12"
# NOTE: the prior local job also asserted `scitex-todo --help` works after
# install (console-script wiring smoke test). The reusable workflow only
# checks `import <pkg>`, not the console script — minor coverage reduction,
# accepted per the centralization goal; flagged in the migration PR/report.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 17 * * *"  # nightly 17:00 UTC (~02:00 JST), off-peak
  workflow_dispatch:

jobs:
  import-smoke:
    uses: scitex-ai/.github/.github/workflows/import-smoke.yml@main
    secrets: inherit
