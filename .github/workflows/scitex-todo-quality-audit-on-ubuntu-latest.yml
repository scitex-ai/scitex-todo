name: quality

# Single-package quality gate — runs `scitex-dev ecosystem audit-all`
# against this package. Mirrors the canonical audit that
# `tests/develop/test_audit.py` runs inside the test suite, but as a
# standalone gate so an audit regression is visible even when the matrix
# is skipped.
#
# `--new-only` is the key flag: scitex-todo carries a known body of
# pre-existing PA-306 (no-mocks) / PA-307 (test-quality) findings that
# are being retired in their own focused PRs. `--new-only` diffs against
# the base ref (default `develop`) and reports ONLY net-new violations,
# so the existing backlog is ratcheted as the baseline (0 net-new ->
# GREEN) while still failing CI the instant a NEW violation is
# introduced. Project-type + rule skips live in `.scitex/dev/config.yaml`
# in this checkout and are applied automatically.
#
# Runner: scitex-todo's self-hosted Spartan CPU runners
#   (spartan-cpu-todo-01 / -02). GitHub-hosted `ubuntu-latest` is
#   unavailable on this account (Actions billing block), and todo runs
#   ALL compute on the dedicated Spartan runners anyway. The
#   `-on-ubuntu-latest` filename is kept for fleet naming consistency
#   (cf. scitex-io / scitex-app / scitex-plt); it is a naming convention,
#   not a runtime assertion — same as rtd-sphinx-build-on-ubuntu-latest.
#   `actions/setup-python` has no tool cache on a self-hosted runner, so
#   `uv` provisions the interpreter and the venv.

on:
  schedule:
    - cron: "0 18 * * *"  # 18:00 UTC (~03:00 JST), after the test run
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".scitex/dev/config.yaml"
      - ".github/workflows/scitex-todo-quality-audit-on-ubuntu-latest.yml"
  pull_request:
    branches: [main, develop]

jobs:
  audit:
    runs-on: [self-hosted, Linux, X64, spartan-cpu]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v3
        with:
          cache-dependency-glob: pyproject.toml

      - name: Fetch develop ref for --new-only baseline
        run: git fetch origin develop:develop || true

      - name: Install package + audit tooling
        run: |
          set -euo pipefail
          uv venv --python 3.12 .venv
          uv pip install --python .venv/bin/python -e ".[all,dev]" \
            || uv pip install --python .venv/bin/python -e ".[dev]" \
            || uv pip install --python .venv/bin/python -e .
          uv pip install --python .venv/bin/python "scitex-dev[cli-audit]>=0.17.14"

      - name: Run scitex-dev ecosystem audit-all (net-new only)
        # .venv/bin on PATH so the auditor's `shutil.which("scitex-dev")`
        # and the per-auditor subprocess spawns resolve to THIS venv
        # (where scitex-todo's console-script is installed).
        run: |
          set -euo pipefail
          export PATH="$PWD/.venv/bin:$PATH"
          scitex-dev ecosystem audit-all scitex-todo --path "$PWD" --new-only --no-version-check
