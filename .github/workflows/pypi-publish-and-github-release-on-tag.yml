name: release

# Tag-driven release pipeline — SELF-HOSTED (Spartan CPU) via uv.
#
# The intended operator flow is:
#
#     git tag vX.Y.Z && git push origin vX.Y.Z
#
# Everything else fires automatically:
#
#   1. test          — matrix pytest in a uv-provisioned venv. Must pass or
#                      the pipeline halts; nothing is published until tests
#                      are green on the tagged commit.
#   2. build         — wheel + sdist via `uv build`, uploaded as artifact.
#   3. publish       — PyPI via MANUAL OIDC trusted publishing, twine running
#                      on a uv-provisioned python.
#   4. release       — GitHub Release with CHANGELOG notes + artifacts.
#
# develop→main promotion is a DELIBERATE, separate PR (operator policy);
# this pipeline never auto-syncs main.
#
# WHY uv, not the SIF (2026-07-11): this pipeline used to apptainer-exec the
# shared ci-cpu.sif because the bare Spartan nodes have no Python tool cache.
# That SIF vanished from the runner host
# (incident-ci-sif-vanished-release-blocked-20260711) and took every repo's
# release down with it — a single unmanaged file as fleet-wide SPOF. The
# rationale was already obsolete: the org-level pytest-matrix reusable
# workflow (scitex-ai/.github) provisions Python on these SAME runners with
# astral-sh/setup-uv (uv downloads a standalone CPython), green since the
# 2026-07-10 migration. This pipeline now uses the identical mechanism, so
# test/build/publish depend on nothing but the checkout and uv:
#   - publish still CANNOT use pypa/gh-action-pypi-publish (a Docker action;
#     the compute nodes have no Docker), so the MANUAL OIDC trusted publishing
#     survives verbatim in .github/ci/publish-with-uv.sh: GitHub OIDC JWT →
#     PyPI mint-token → twine upload. Trust config on PyPI is unchanged
#     (it keys on owner/repo/workflow-file, none of which change).
#   - actions/checkout, upload/download-artifact, softprops release are JS
#     actions and run fine on the self-hosted runner.
# fail-loud: a missing interpreter/artifact is a HARD error, never a silent
# fallback.
#
# runs-on driven by repo Actions Variable CI_RUNS_ON (same as before).
#
# Manual re-run: the workflow also accepts a `version` input via
# workflow_dispatch so you can re-publish without re-tagging. NOTE:
# workflow_dispatch executes THIS FILE from the default branch against the
# given tag — which is exactly how the stranded v0.8.0 gets published after
# this conversion merges.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to publish (e.g. v0.10.19) — must already exist on the repo'
        required: true
        type: string

jobs:
  test:
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '["self-hosted","Linux","X64","scitex-ci"]') }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            v="${GITHUB_REF#refs/tags/}"
          else
            v="${{ inputs.version }}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.version }}
          fetch-depth: 0
      # uv-provisioned test run — the exact install+pytest mechanism of the
      # org-level pytest-matrix reusable workflow, proven green on these same
      # spartan-cpu runners (uv downloads a standalone CPython; nothing is
      # needed on the bare node).
      - uses: astral-sh/setup-uv@v3
        with:
          cache-dependency-glob: pyproject.toml
      - name: Run tests in a uv venv (deps provisioned, not on the bare runner)
        run: |
          set -euo pipefail
          uv venv --python ${{ matrix.python-version }} .venv
          uv pip install --python .venv/bin/python -e ".[all,dev]" \
            || uv pip install --python .venv/bin/python -e ".[dev]" \
            || uv pip install --python .venv/bin/python -e .
          .venv/bin/python -m pytest tests/

  build:
    needs: test
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '["self-hosted","Linux","X64","scitex-ci"]') }}
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            v="${GITHUB_REF#refs/tags/}"
          else
            v="${{ inputs.version }}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.version }}
          fetch-depth: 0
      # Build via uv's native frontend — wheel + sdist into dist/.
      # fail-loud on empty dist.
      - uses: astral-sh/setup-uv@v3
        with:
          cache-dependency-glob: pyproject.toml
      - name: Build wheel + sdist (uv build)
        run: |
          set -euo pipefail
          uv build
          ls -la dist/
          [ -n "$(ls -A dist 2>/dev/null)" ] || { echo "::error::uv build produced an empty dist/"; exit 1; }
      # upload-artifact is a JS action — runs fine on the self-hosted runner.
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '["self-hosted","Linux","X64","scitex-ci"]') }}
    environment:
      name: pypi
      url: https://pypi.org/p/scitex-todo
    # id-token: write is what populates ACTIONS_ID_TOKEN_REQUEST_{TOKEN,URL},
    # which publish-in-sif.sh uses to mint the OIDC JWT. Keep it.
    # contents: read is REQUIRED for actions/checkout to clone this PRIVATE
    # repo — declaring `permissions:` at all defaults every unlisted scope to
    # `none`, so without this the token can't read the repo and checkout fails
    # with "Repository not found" (the release break v0.7.21..v0.7.28).
    permissions:
      id-token: write
      contents: read
    steps:
      # Need the repo checked out so .github/ci/publish-with-uv.sh is on
      # disk (the build job uploaded only dist/).
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      # Manual OIDC trusted publishing — pypa/gh-action-pypi-publish is a
      # Docker action and the Spartan compute nodes have no Docker.
      # publish-with-uv.sh: GitHub OIDC JWT (audience=pypi) → PyPI mint-token →
      # twine upload dist/*, python provisioned by uv. fail-loud at each step.
      - uses: astral-sh/setup-uv@v3
        with:
          cache-dependency-glob: pyproject.toml
      - name: Publish to PyPI via manual OIDC trusted publishing (uv python)
        run: bash .github/ci/publish-with-uv.sh

  release:
    needs: [build, publish]
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '["self-hosted","Linux","X64","scitex-ci"]') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.version }}
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          VERSION="${VERSION#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {p=1; next}
            p && /^## \[/ {exit}
            p
          ' CHANGELOG.md > release-notes.md || true
          if [ ! -s release-notes.md ]; then
            echo "Release v${VERSION}. See CHANGELOG.md for details." > release-notes.md
          fi
      # JS action that talks to the GitHub Releases API directly. The bare
      # Spartan self-hosted runner has NO `gh` CLI, so the old `gh release
      # create` failed with `gh: command not found` (exit 127) AFTER publish --
      # PyPI shipped but no Release page. JS actions run fine on the self-hosted
      # runner (same class as actions/checkout + upload-artifact), so this is the
      # fail-loud-safe equivalent: CHANGELOG notes + dist/* assets, no `gh` dep.
      # Needs the job's `permissions: contents: write` (already set); the action
      # uses ${{ github.token }} by default.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          body_path: release-notes.md
          files: dist/*
          fail_on_unmatched_files: true
