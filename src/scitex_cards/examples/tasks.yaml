  - id: scitex-io-clew-tracker-wiring
    title: "CLOSED: wrong fix site — superseded by ripple-route-reads-through-scitex-io-load
      (PR#54+57+58+61+62+63 chain landed; observer pattern already wired in scitex_io)"
    status: done
    created_at: '2026-06-12T20:38:38Z'
    last_activity: '2026-06-13T18:13:45Z'
    scope: upstream-fix
    assignee: proj-scitex-dev
    priority: 2
    note: "## ⚠ HOLD — original premise was WRONG\n\nThe original card's premise (\"\
      scitex_io has no scitex_clew integration\") was **incorrect** — proj-paper-ripple-wm's
      grep missed the decoupled observer/hook pattern. The integration mechanism IS
      already wired and DOES work in a local end-to-end repro:\n\n- `scitex_io._observers/__init__.py:39`
      declares `_post_save_hooks: List[PostSaveHook]` and `_post_load_hooks` registries.\n\
      - `scitex_io/_save.py:341,345` fires `fire_post_save(saved_path, obj, kwargs)`
      after every successful save.\n- `scitex_clew/__init__.py:407-409` AT IMPORT
      TIME calls `_register()` → `register_with_scitex_io()` → `scitex_io.register_post_save_hook(on_io_save)`
      + `register_post_load_hook(on_io_load)`.\n\n### Empirical confirmation (agent
      venv, just now)\n\n```python\nimport scitex_io\nfrom scitex_io import _observers
      as obs\nprint(len(obs._post_save_hooks))   # 0  ← no hooks yet\nimport scitex_clew\
      \                 #     ← triggers _register()\nprint(len(obs._post_save_hooks))\
      \   # 1  ← scitex_clew._observers.on_io_save registered\n```\n\nFull end-to-end
      inside an active `scitex.session.start(...)` session:\n- `get_tracker()` returns
      a live `SessionTracker`.\n- `scitex.io.save('hello clew', './probe_output.txt')`
      fires the hook.\n- `tracker._outputs = {'/tmp/.../probe_output.txt': '086d21afca…'}`
      ← hash captured.\n- `db.get_file_hashes(session_id) = {path: hash}` ← landed
      in clew DB.\n\nSo **the fix site is NOT scitex_io**. Probable real root causes
      under investigation:\n\n(a) Whether `scitex_clew` is imported in the SLURM run
      process (if not, hooks never register and io fires into the void).\n(b) Whether
      the analysis scripts open a clew session in the SLURM env (no active session
      → on_io_save's `if tracker is None: return` no-ops silently).\n(c) Whether the
      SLURM SIF apptainer container puts the clew DB at a discoverable path (a divergent
      DB path on Spartan vs the export path the operator inspected would also explain
      \"file_hashes=0\").\n\n### Action\n\nDo NOT implement the original 3-line patch
      — it would add a duplicate redundant hook to an io that already has one, doubling
      captures and confusing audit. The real fix is somewhere up the chain. Updating
      to status=blocked / blocker=dependency until proj-paper-ripple-wm's empirical
      SLURM-side investigation pins (a), (b), or (c).\n\n## Refs\n- corrected by lead
      msg `ef25697f688a480ebc57a3159618574a`\n- empirical repro session in agent venv:
      session_id `2026Y-06M-13D-05h42m46s_slg0`\n- original (incorrect) audit msg
      `204ab7f80104415bb97640428f71da72` — kept for trail."
    project: scitex-io
    agent: proj-scitex-dev
    goal: "Make scitex_clew's computation DAG drawable end-to-end (LOAD → GPFA → NT
      → ML → figures). Currently the DAG is N disconnected single-node islands because
      file_hashes=0 → session_parents=0."
    kind: task
