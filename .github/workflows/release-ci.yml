name: release-ci

# Post-merge validation gate. Runs on push to protected branches
# (main, develop) and as the canonical scheduled run. Always uses the
# FULL pytest matrix — no conditional skipping — so the protected-branch
# history is exercised on every supported Python.
#
# L1 concurrency — coalesce overlapping pushes on the same branch.
# L5a uv-managed Python (`uv python install` + `uv venv --python`) so each
#     matrix leg pins its interpreter independently of the runner.
# L5b .venv/bin on PATH so console scripts resolve without `uv run`.

on:
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *"  # nightly 07:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tests:
    name: pytest-matrix-on-ubuntu-py${{ matrix.python-version }}
    runs-on: [self-hosted, scitex-ci]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Set up Python ${{ matrix.python-version }} (uv-managed)
        run: uv python install ${{ matrix.python-version }}
      - name: Create uv venv on this matrix Python
        run: uv venv --python ${{ matrix.python-version }} .venv
      - name: Install dependencies
        run: |
          uv pip install --python .venv/bin/python -e ".[all,dev]" \
            || uv pip install --python .venv/bin/python -e ".[dev]" \
            || uv pip install --python .venv/bin/python -e .
      - name: Run tests
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          .venv/bin/pytest tests/ --cov=src/scitex_todo --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        if: always() && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  import-smoke:
    name: import-smoke-on-ubuntu-py3-12
    runs-on: [self-hosted, scitex-ci]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Set up Python 3.12 (uv-managed)
        run: uv python install 3.12
      - name: Install (no extras) in uv venv
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv/bin/python -e .
      - name: Import smoke
        run: .venv/bin/python -c "import scitex_todo; print(getattr(scitex_todo, '__version__', 'unversioned'))"

  audit:
    name: audit
    runs-on: [self-hosted, scitex-ci]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Set up Python 3.12 (uv-managed)
        run: uv python install 3.12
      - name: Install package + audit tooling
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv/bin/python -e ".[dev]"
          uv pip install --python .venv/bin/python "scitex-dev[cli-audit]"
      - name: Run scitex-dev audits (scope-down, drift backlogged)
        # PR #110 fix-forward (lead a2a `fb413fb038da49d1b18262b237385c33`,
        # 2026-06-12). The replacement `audit-all` step from main turns
        # the audit gate into a re-audit of pre-existing develop drift
        # on every push (184 PA-307 TQ002/TQ003/TQ004/TQ007 violations
        # across the legacy test suite + 7 SK warnings on over-budget
        # skill leaves). The TQ rule explicitly has "No # stx-allow
        # suppression" and the SK warnings still return non-zero from
        # audit-skills, so the only "all green" paths are:
        #   1. Run only the audit categories whose drift is fixable in
        #      a small focused PR (audit-cli + audit-project — handled
        #      via `.scitex/dev/cli-audit-dict.yaml` + `audit.skip`).
        #   2. Treat audit-skills as warn-only (`|| true`) until the
        #      SK-301/401/710/701 cleanup PR lands.
        #   3. Defer audit-python-apis until the AAA-marker sweep PR.
        # `audit-mcp-tools` is run but auto-skips on CI ("no
        # _mcp_server.mcp found") because the audit job installs only
        # `[dev]`, not `[mcp]`. Local invocations with `[mcp]` will see
        # a §6 violation tracked as a separate backlog item.
        # Restore the canonical `audit-all` invocation once the three
        # backlog PRs land (PA-307 sweep / SK-301/401 trim / MCP §6
        # parity).
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          set -e
          scitex-dev ecosystem audit-cli       scitex-todo
          scitex-dev ecosystem audit-mcp-tools scitex-todo
          # audit-skills returns rc=1 even when every finding is WARN
          # (scitex-dev/_cli/audit/_skills/_audit.py:558,583). Echo the
          # findings so they stay visible in the log, then continue.
          scitex-dev ecosystem audit-skills    scitex-todo || true
          scitex-dev ecosystem audit-project   scitex-todo