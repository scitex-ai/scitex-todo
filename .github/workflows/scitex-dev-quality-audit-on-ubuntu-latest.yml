name: quality

# Per-repo SciTeX quality audit. Installs the package + scitex-dev and runs
# `scitex-dev ecosystem audit-all` against this checkout (CLI, MCP, skills,
# Python-API, and project-structure conformance).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 8 * * *"  # 08:00 UTC, after the 07:00 test runs
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Fetch develop so --since develop has a base ref to diff against.
      # actions/checkout@v4 only fetches the PR head by default.
      - name: Fetch develop for diff-aware audit base
        run: |
          git fetch --no-tags --depth=50 origin develop:develop || \
            git fetch --no-tags origin develop:develop
      - name: Install package + scitex-dev (from develop for --new-only)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          # Pin scitex-dev to develop while the diff-aware audit flag
          # (--new-only --since BASE) is being released. Lead a2a 46a74fad
          # (2026-06-07): scitex-dev PR #138 merged the flag; PyPI release
          # comes later. Until then, install from the develop branch so this
          # workflow can use it. Swap back to `pip install scitex-dev` once
          # the version with --new-only is on PyPI.
          pip install "git+https://github.com/ywatanabe1989/scitex-dev.git@develop"
      - name: Run scitex-dev audit-all (diff-aware vs develop)
        run: |
          # --new-only --since develop flags ONLY violations new in this
          # PR's diff vs the develop branch, not the inherited repo-wide
          # debt. Lead a2a 46a74fad / 6ae9ba62 (2026-06-07): the gate has
          # been failing every PR on pre-existing TQ/PS debt; the new flag
          # closes that.
          scitex-dev ecosystem audit-all scitex-todo \
            --new-only --since develop \
            --no-version-check
