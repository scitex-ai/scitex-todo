  - id: ripple-route-reads-through-scitex-io-load
    title: route input-side reads through scitex.io.load to close clew DAG 
      input-hash gap
    status: pending
    created_at: '2026-06-12T20:54:24Z'
    last_activity: '2026-06-12T20:54:24Z'
    scope: ripple-wm-side
    assignee: proj-paper-ripple-wm
    priority: 2
    note: "## Background\n\nproj-paper-ripple-wm clew-DAG audit (lead-approved msg
      `77eb66d79f5c450db227f2d985266f7f`). Live Spartan-side clew DB at `/home/ywatanabe/proj/ripple-wm/.scitex/clew/runtime/db.sqlite`
      (1.7 MB, populated by the in-flight chain):\n\n```\nruns:                 141\n\
      file_hashes:         3732    output=3700, input=33   ← 100x asymmetry\nsession_parents:\
      \        3\nverification_results:   0\nclaims:                 1\n```\n\nThe
      output-side hash capture works perfectly (every `scitex.io.save` fires the observer
      hook → `tracker._outputs` → `db.add_file_hash(role=output)`). The INPUT side
      is starved because several analysis sites bypass `scitex.io.load`:\n\n| Site\
      \                                                  | Reads via             \
      \     | Suggested route                            |\n|-------------------------------------------------------|----------------------------|--------------------------------------------|\n\
      | `src/ripple_wm/spike_times_io.py` `load_trial_dfs`    | `pd.read_parquet(fp,
      …)`   | Either fire `scitex_io._observers.fire_post_load(path, df)` per file,
      OR route through `scitex.io.load(fp)` — PR#53's deliberate parquet round-trip
      can stay; we just need clew to learn each parquet file is being consumed. |\n\
      | `scripts/nt/visualization/{kde_8_factors,scatter_kde}.py` etc. | `np.load(...)`\
      \     | Replace with `scitex.io.load(...)` — scitex.io.load handles .npy natively
      (already used elsewhere). |\n| `scripts/utils/_helpers.py`-style direct `pd.read_csv`
      | `pd.read_csv(...)`         | Replace with `scitex.io.load(...)` for .csv.
      |\n\n## Why this matters\n\nWithout input-side hashes, scitex_clew's chain construction
      (`_chain/_verify_ops.py:131-132`) cannot match `output_hash(LOAD-run_X) == input_hash(GPFA-run_Y)`.
      The session_parents edge never derives → the computation DAG stays as 141 disconnected
      run nodes.\n\n## Constraint — preserve PR#53\n\n`load_trial_dfs` was deliberately
      moved off `scitex.io.load` in PR#53 to use the parquet round-trip directly (fixes
      the pandas StringDtype pickle fragility). DO NOT undo PR#53's behavior. Instead,
      fire the post-load hook explicitly per file:\n\n```python\nfrom scitex_io._observers
      import fire_post_load\n…\nfor fp in sorted(src.glob(\"*.parquet\")):\n    df
      = pd.read_parquet(fp, engine=\"pyarrow\")\n    fire_post_load(fp, df)   # tells
      clew this file is an input of the current session\n    out.append(df)\n```\n\
      \nThis keeps the parquet path AND notifies clew. Same approach for any other
      deliberate-bypass site.\n\n## Test plan\n\n1. Local repro in agent venv: `scitex.session.start`
      → call `load_trial_dfs(dir)` on a synthetic parquet dir → confirm `tracker._inputs`
      contains every read file with sha256.\n2. Spartan: re-submit chain → expect
      `file_hashes` input-role to climb from 33 → at least an order of magnitude (every
      GPFA/NT/ML script that calls `load_trial_dfs` or reads NT .npy will contribute).\n\
      3. After session_parents auto-derivation lands (separate clew-side card), the
      DAG should chain LOAD → GPFA → NT → ML automatically.\n\n## Refs\n\n- lead approval:
      msg `77eb66d79f5c450db227f2d985266f7f`\n- corrected-audit report to lead: msg
      `2a283650c39246dd8991d15e786ddf67`\n- proj-scitex-dev sign-off: msg `a02ed6ce14374b0fbb81149ebccd128c`\n\
      - companion (clew-side) card: `clew-auto-derive-session-parents-on-close`\n\
      - closed predecessor cards (wrong fix site): `scitex-io-clew-tracker-wiring`,
      `figrecipe-clew-tracker-wiring`"
    project: ripple-working-memory
    agent: proj-paper-ripple-wm
    goal: Close the input-hash asymmetry (33 inputs vs 3700 outputs in Spartan 
      clew DB) so GPFA-output→NT-input edges in the computation DAG can match by
      sha256 instead of staying disconnected.
    kind: task
  - id: clew-auto-derive-session-parents-on-close
    title: auto-derive session_parents edges from input/output hash match on 
      session close
    status: pending
    created_at: '2026-06-12T20:54:41Z'
    last_activity: '2026-06-12T20:54:41Z'
    scope: upstream-fix
    priority: 2
    note: "## Background\n\nproj-paper-ripple-wm clew-DAG audit (lead-approved msg
      `77eb66d79f5c450db227f2d985266f7f`). Live Spartan-side clew DB at `/home/ywatanabe/proj/ripple-wm/.scitex/clew/runtime/db.sqlite`:\n\
      \n```\nruns:                 141\nfile_hashes:         3732    (output=3700,
      input=33)\nsession_parents:        3    ← only 3 edges across 141 runs, all
      pointing at one Jun-7 session\n```\n\n`scitex_clew/_chain/_verify_ops.py:131-132`
      already contains the hash-matching logic:\n\n```python\ninput_hashes = db.get_file_hashes(session_id,
      role=\"input\")\noutput_hashes = db.get_file_hashes(session_id, role=\"output\"\
      )\n```\n\n…but it lives in a verify pass that has to be called explicitly (e.g.
      via `clew chain build` or similar). Nothing wires it into the `on_session_close`
      lifecycle, so the DAG edges never auto-derive at run time.\n\n## What needs
      to land\n\nIn `scitex_clew/_observers/_session.py:on_session_close` (or `_lifecycle/_close.py`
      if the right hook seam lives there), after `stop_tracking(...)`:\n\n```python\n\
      # Post-close edge-derivation: for every output hash this run produced,\n# find
      every prior run whose input hash matches → record_session_parent(child=prior,
      parent=this).\n# Or the reverse: for every input this run consumed, find the
      run that produced\n# the matching output → record_session_parent(child=this,
      parent=producer).\n```\n\nEither direction is fine; the operator probably wants
      the second shape (this-run knows what it depended on at close time).\n\nThis
      must be tolerant of multi-match (one file consumed by N runs → N parent edges)
      and missing producers (a file not produced by any tracked run is just untracked
      input — don't synthesise a parent).\n\n## Why this matters\n\nThe companion
      card `ripple-route-reads-through-scitex-io-load` (on ripple-wm's queue) will
      close the input-side capture asymmetry — that drives input file_hashes from
      ~33 toward thousands. With that landed AND this auto-derivation wired, the LOAD
      → GPFA → NT → ML → figures chain becomes a connected DAG automatically every
      time the slurm chain runs.\n\nWithout this, the operator would have to manually
      run `clew chain build` (or its equivalent) after every chain to get the edges.
      The whole point of an observer-based provenance system is that it works without
      that imperative step.\n\n## Owner\n\nNo proj-scitex-clew agent on the a2a peer
      list (only proj-paper-scitex-clew which is paper-side). Lead is routing this
      card via msg `77eb66d79f5c450db227f2d985266f7f` — TBD-no-clew-agent. Holding
      in queue with assignee blank pending lead's owner decision.\n\n## Refs\n\n-
      lead approval: msg `77eb66d79f5c450db227f2d985266f7f`\n- corrected-audit report:
      msg `2a283650c39246dd8991d15e786ddf67`\n- companion (ripple-wm-side) card: `ripple-route-reads-through-scitex-io-load`\n\
      - closed predecessor cards (wrong fix site): `scitex-io-clew-tracker-wiring`,
      `figrecipe-clew-tracker-wiring`"
    project: scitex-clew
    goal: Close the clew computation-DAG edge-derivation gap so session_parents 
      auto-populates from existing file_hash matches without requiring an 
      explicit "clew chain build" invocation.
    kind: task
  - id: scitex-dict-dotdict-case-divergence
    title: _DotDict case-sensitivity diverges from scitex_io.DotDict; uppercases
      keys but rejects lowercase access
    status: pending
    created_at: '2026-06-13T07:06:51Z'
    last_activity: '2026-06-13T07:06:51Z'
    scope: ecosystem-consistency
    priority: 2
    note: "## Bug shape\n\nTwo DotDict implementations in the scitex ecosystem have
      divergent case policies:\n\n| impl                          | uppercases on
      write? | case-sensitive on read? |\n|-------------------------------|----------------------|-------------------------|\n\
      | `scitex_dict._DotDict`         | YES                  | **YES** ← rejects
      `data.mid_start` after writing `data.MID_START` |\n| `scitex_io._utils.DotDict`\
      \     | YES                  | **NO**  ← accepts both casings |\n\nInternally
      inconsistent shape of `scitex_dict._DotDict`: it silently mutates keys to uppercase
      but refuses lowercase reads. Pick one policy and apply it consistently — either
      case-insensitive (matches scitex_io) or case-preserving (don't uppercase silently).\n\
      \n## Concrete impact — ripple-wm NT 26067906\n\n```\nFile \"/work/./scripts/nt/calc_geometrics_medians.py\"\
      , line 49, in calculate_gs\n    :, :num_factors, data.mid_start : data.mid_end\n\
      File \"/opt/sif-pkgs/scitex_dict/_DotDict.py\", line 44, in __getattr__\n  \
      \  raise AttributeError(\nAttributeError: 'DotDict' object has no attribute
      'mid_start'\n```\n\n5 sites in ripple-wm had to be swapped to uppercase (`data.MID_START`,
      `data.MID_END`) as a workaround so the NT chain could clear. Workaround PR:
      https://github.com/ywatanabe1989/ripple-wm/pull/62.\n\nAll 5 sites use the same
      shape inside a `for phase, data in CONFIG.PHASES.PHASES.items()` loop:\n\n```\n\
      scripts/nt/calc_geometrics_medians.py:49\nscripts/nt/distance/between_gs/calc_dist/_calc_dists.py:41\n\
      scripts/nt/TDA/persistent_homology.py:123\nscripts/nt/TDA/TDA.py:313\nscripts/nt/TDA/TDA_each_condition.py:312\n\
      ```\n\n## Why no agent-env test caught it\n\nThe agent venv resolves CONFIG.PHASES.PHASES.items()
      through `scitex_io._utils.DotDict` (case-insensitive) so lowercase access works
      locally. The SIF runtime resolves through `scitex_dict._DotDict` (case-sensitive).
      No cross-impl parity test exists, so the divergence ship to production undetected.\n\
      \n## Suggested fix\n\n1. **Pick one case policy** and adopt it across both impls
      (and any other DotDict implementations in the ecosystem). Recommend case-insensitive
      matching what scitex_io already does — minimises code-side discipline burden
      (\"CONFIG is dict-like, attr access works for any casing\").\n2. **Add a cross-impl
      parity test** in scitex-test or a shared test fixture: every DotDict impl loaded
      against the same YAML must pass an identical set of attr-access tests including
      mixed-case reads. Prevents future drift.\n3. **Once the policy is uniform**,
      the ripple-wm workaround can revert via one-line sed back to clean lowercase
      (the original upstream author's preferred style).\n\n## Refs\n\n- lead approval
      / routing: msg `f1eb958f09eb41d1b4461db02d4050fb`\n- ripple-wm workaround PR:
      #62 (merged commit will be linked once known)\n- ripple-wm chain that surfaced
      this: NT 26067906 FAILED 1:45 exit 1\n- offending impl files: `scitex_dict/_DotDict.py:41,44`
      (__getattr__ KeyError → AttributeError)"
    project: scitex-dict
    goal: Unify DotDict case policy across scitex packages so YAML-loaded 
      configs behave identically in agent venv vs Spartan SIF runtime. Currently
      scitex_dict._DotDict silently uppercases keys but is case-sensitive on 
      read; scitex_io._utils.DotDict is case-insensitive. This divergence bit 
      ripple-wm NT 26067906 at calc_geometrics_medians.py:49 and forced a 5-site
      workaround PR upstream.
    kind: task
