name: tests
# PILOT: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Triggers/concurrency preserved verbatim from the prior local file.
# New required-status-check context: "pytest-matrix / pytest-matrix-on-ubuntu-py<X.YY>"
# NOTE: the prior local job set `strategy.max-parallel: 1` (scitex-todo has
# only 3 dedicated spartan-cpu runners; unbounded parallel matrix legs
# saturate the pool and starve other PRs/workflows) and used
# `continue-on-error: true` + an isolated HOME on the Codecov upload step
# (self-hosted-runner ~/.gitconfig race mitigation). The reusable
# pytest-matrix.yml has neither — accepted per the centralization goal
# (Codecov upload already has `fail_ci_if_error: false` in both versions,
# so it cannot fail the job either way); flagged in the migration PR/report
# as a runner-pool-saturation risk worth reintroducing upstream if it bites.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 17 * * *"  # nightly 17:00 UTC (~02:00 JST), off-peak
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pytest-matrix:
    uses: scitex-ai/.github/.github/workflows/pytest-matrix.yml@main
    secrets: inherit
