# scitex-dev audit-cli — per-package vocabulary additions
#
# Format expected by scitex_dev/_cli/audit/_summary/_audit.py::_load_custom_dict():
#   nouns:            [...]
#   transitive_verbs: [...]
#   intransitive_verbs: [...]
#
# Keys must match exactly. The auditor merges this dict with its base
# catalog + Moby POS, then classifies each CLI sub-command token. A
# token labelled "unknown" by §1d would emit a violation pointing here.

nouns:
  # Domain nouns Moby does not carry. Both are group tokens, and a group
  # token MUST be a noun (§1) — these are the resources, not actions.
  - inbox    # `scitex-cards inbox <verb>` — the per-recipient notification inbox
  - notifyd  # `scitex-cards notifyd <verb>` — the delivery daemon (a daemon name)

intransitive_verbs:
  # ── scitex-cards CLI leaf-verbs the Moby POS classifier rejects ─────────
  # Each is an intransitive verb / verb-phrase in THIS CLI's context (an
  # agent ACTS): "watch CI", "comment on a card", "close a task".
  # Whitelisted via the §1/§1d escape hatch the auditor itself points to,
  # rather than renamed, because these subcommands are established +
  # operator-facing and a rename would be worse UX.
  #
  # REMOVED 2026-07-19 (cli/noun-verb-restructure): `next`, `runnable`,
  # `blocked` and `summary` used to be whitelisted here. They are NOT verbs
  # — `runnable`/`blocked` are adjectives, `next` a determiner, `summary` a
  # noun — and whitelisting them papered over the defect instead of fixing
  # it. They are now MODE FLAGS on `cards list`, which IS a verb, and the
  # old names survive only as hidden Phase-W aliases. A dictionary entry
  # that exists to make a wrong name pass is a lie told to the linter.
  - ci-watch   # `scitex-cards ci-watch` — poll GitHub CI (decoupled poller)
  - comment    # `scitex-cards comment`  — append a comment to a card
  - close      # `scitex-cards close`    — close / resolve a task
  - watch      # `scitex-cards watch`    — follow board changes live
  - manifest   # `scitex-cards dev skills manifest` — emit the skills manifest

# §1f verb-synonym opt-outs. Every entry needs an inline `# why` — see
# doctrine 07_audit-cli.md / 06_noun-verb-catalog.md.
verb_exceptions:
  - resolve  # why: `scitex-todo resolve-store` means "figure out which
             # config file path wins" (store-path precedence-chain
             # resolution — the debugging tool for "why is my task not
             # showing up"), NOT "close a task with a resolution". The
             # blanket resolve→done verb-synonym mapping (correct for
             # task-lifecycle terminal states, see 06_noun-verb-catalog.md
             # "Terminal-state verbs") over-fires on this noun-scoped
             # "resolve a path" usage. `done`/`close` remain the only
             # task-lifecycle terminal verbs; `resolve-store` is a
             # read-only diagnostic, unrelated to that vocabulary.
             # 2026-07-10 CLI-standardization audit pass.
