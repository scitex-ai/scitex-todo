name: pr-ci

# Consolidated PR-only CI gate. Runs the per-PR validation suite as a
# single workflow so the cancel-in-progress concurrency group + path
# filters apply uniformly. Post-merge validation lives in release-ci.yml.
#
# SIF-based self-hosted CI (operator standardization 2026-06-18). Every job
# runs INSIDE the pre-built, reused scitex-ci SIF (`apptainer exec
# ci-cpu.sif`) on the Spartan CPU runner, instead of the old bare-runner
# `setup-uv@v3 + uv python install` steps (which failed at job init,
# steps=0, on the self-hosted runner). The shared SIF bakes
# scitex-dev[all,dev] + python 3.11/3.12/3.13 + uv; each job layers THIS
# checkout + its extras into a writable --target dir inside the SIF (see
# .github/ci/*.sh). fail-loud: a missing SIF/shim is a HARD error.
#
# runs-on driven by repo Actions Variable CI_RUNS_ON; SIF + apptainer
# paths come from SCITEX_CI_SIF / SCITEX_CI_APPTAINER.
#
# L1 concurrency — cancel superseded PR runs.
# L3 path filters — skip docs/skills/examples/markdown-only PRs.
# L4 conditional matrix — full ["3.11","3.12","3.13"] on PR.

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '_skills/**'
      - 'examples/**'
      - '**.md'
      - 'CHANGELOG.*'
      - '.github/CODEOWNERS'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  SCITEX_CI_APPTAINER: ${{ vars.SCITEX_CI_APPTAINER }}
  SCITEX_CI_SIF: ${{ vars.SCITEX_CI_SIF }}

jobs:
  import-smoke:
    name: import-smoke-on-ubuntu-py3-12
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '["self-hosted","Linux","X64","scitex-ci"]') }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Import smoke in the reused CI SIF (bare install + import + --help)
        run: bash .github/ci/exec-in-sif.sh import-smoke.sh 3.12

  dep-hygiene-smoke:
    name: dep-hygiene-smoke
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '["self-hosted","Linux","X64","scitex-ci"]') }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Bare install + import on py3.11 in the reused CI SIF
        run: bash .github/ci/exec-in-sif.sh import-smoke.sh 3.11

  tests:
    name: pytest-matrix-on-ubuntu-py${{ matrix.python-version }}
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '["self-hosted","Linux","X64","scitex-ci"]') }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ github.event_name == 'pull_request' && fromJson('["3.11", "3.12", "3.13"]') || fromJson('["3.12"]') }}
    steps:
      - uses: actions/checkout@v4
      - name: Run tests in the reused CI SIF (apptainer exec — deps layered, not on the bare runner)
        run: bash .github/ci/exec-in-sif.sh run-in-sif.sh ${{ matrix.python-version }}
      - name: Upload coverage to Codecov
        if: always() && matrix.python-version == '3.12'
        continue-on-error: true  # codecov-action can fail on the self-hosted runner; coverage upload must never gate CI
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  audit:
    name: audit
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '["self-hosted","Linux","X64","scitex-ci"]') }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Run scitex-dev audits in the reused CI SIF (scope-down, drift backlogged)
        # PR #110 fix-forward. See release-ci.yml's audit step for the full
        # rationale. Same divergence from main: skip audit-python-apis until
        # the AAA-marker sweep lands; treat audit-skills as warn-only until the
        # SK-301/401 cleanup. The scope-down logic lives in .github/ci/audit.sh.
        run: bash .github/ci/exec-in-sif.sh audit.sh 3.12
